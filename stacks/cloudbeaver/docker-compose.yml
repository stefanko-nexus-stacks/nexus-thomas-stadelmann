# =============================================================================
# CloudBeaver - Web-based database management tool
# =============================================================================
# Access via: https://cloudbeaver.${domain}
# CloudBeaver is an open-source web-based database management tool that
# supports PostgreSQL, MySQL, MariaDB, SQL Server, Oracle, and more.
#
# Auto-setup: Admin user is created automatically via CB_ env vars in .env
# Note: CB_ADMIN_NAME must NOT be "admin" (reserved team name in CloudBeaver)
# =============================================================================

services:
  cloudbeaver:
    image: ${CLOUDBEAVER_IMAGE:-dbeaver/cloudbeaver:24}
    container_name: cloudbeaver
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    ports:
      - "8978:8978"
    environment:
      - CLOUDBEAVER_APP_ANONYMOUS_ACCESS_ENABLED=true
    volumes:
      - cloudbeaver-data:/opt/cloudbeaver/workspace
    networks:
      - app-network

volumes:
  cloudbeaver-data:
    driver: local

networks:
  app-network:
    external: true
