name: Setup Nexus Control Plane

on:
  workflow_dispatch:
  workflow_call:
    outputs:
      r2_access_key_id:
        description: 'R2 Access Key ID (for spin-up workflow)'
        value: ${{ jobs.deploy.outputs.r2_access_key_id }}
      r2_secret_access_key:
        description: 'R2 Secret Access Key (for spin-up workflow)'
        value: ${{ jobs.deploy.outputs.r2_secret_access_key }}
      r2_data_access_key:
        description: 'R2 Data Bucket Access Key (for spin-up workflow)'
        value: ${{ jobs.deploy.outputs.r2_data_access_key }}
      r2_data_secret_key:
        description: 'R2 Data Bucket Secret Key (for spin-up workflow)'
        value: ${{ jobs.deploy.outputs.r2_data_secret_key }}
      r2_data_bucket:
        description: 'R2 Data Bucket Name (for spin-up workflow)'
        value: ${{ jobs.deploy.outputs.r2_data_bucket }}
      ssh_pubkey:
        description: 'SSH Public Key (for spin-up workflow)'
        value: ${{ jobs.deploy.outputs.ssh_pubkey }}
      ssh_private_key:
        description: 'SSH Private Key (for spin-up during initial setup)'
        value: ${{ jobs.deploy.outputs.ssh_private_key }}

permissions:
  contents: read
  actions: write

# NOTE: No concurrency here - handled by calling workflow (initial-setup.yaml)
# When called directly via workflow_dispatch, runs without concurrency lock

jobs:
  deploy:
    name: Setup Nexus Control Plane
    runs-on: ubuntu-latest
    outputs:
      r2_access_key_id: ${{ steps.r2_credentials.outputs.r2_access_key_id }}
      r2_secret_access_key: ${{ steps.r2_credentials.outputs.r2_secret_access_key }}
      r2_data_access_key: ${{ steps.r2_data.outputs.r2_data_access_key }}
      r2_data_secret_key: ${{ steps.r2_data.outputs.r2_data_secret_key }}
      r2_data_bucket: ${{ steps.r2_data.outputs.r2_data_bucket }}
      ssh_pubkey: ${{ steps.ssh_key.outputs.ssh_pubkey }}
      ssh_private_key: ${{ steps.ssh_key.outputs.ssh_private_key }}
    env:
      TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      TF_VAR_cloudflare_account_id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      TF_VAR_cloudflare_zone_id: ${{ secrets.CLOUDFLARE_ZONE_ID }}
      TF_VAR_hcloud_token: ${{ secrets.HCLOUD_TOKEN }}
      TF_VAR_domain: ${{ secrets.DOMAIN }}
      TF_VAR_access_emails: ${{ secrets.ACCESS_EMAILS }}
      TF_VAR_infisical_token: ${{ secrets.INFISICAL_TOKEN }}
      TF_VAR_dockerhub_username: ${{ secrets.DOCKERHUB_USERNAME }}
      TF_VAR_dockerhub_token: ${{ secrets.DOCKERHUB_TOKEN }}
      TF_VAR_github_owner: ${{ github.repository_owner }}
      TF_VAR_github_repo: ${{ github.event.repository.name }}
      # Hetzner Object Storage (for LakeFS bucket)
      TF_VAR_hetzner_object_storage_access_key: ${{ secrets.HETZNER_OBJECT_STORAGE_ACCESS_KEY }}
      TF_VAR_hetzner_object_storage_secret_key: ${{ secrets.HETZNER_OBJECT_STORAGE_SECRET_KEY }}
      TF_VAR_external_s3_endpoint: ${{ secrets.EXTERNAL_S3_ENDPOINT }}
      TF_VAR_external_s3_region: ${{ secrets.EXTERNAL_S3_REGION || 'auto' }}
      TF_VAR_external_s3_access_key: ${{ secrets.EXTERNAL_S3_ACCESS_KEY }}
      TF_VAR_external_s3_secret_key: ${{ secrets.EXTERNAL_S3_SECRET_KEY }}
      TF_VAR_external_s3_bucket: ${{ secrets.EXTERNAL_S3_BUCKET }}
      TF_VAR_external_s3_label: ${{ secrets.EXTERNAL_S3_LABEL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install OpenTofu
        uses: opentofu/setup-opentofu@v2
        with:
          tofu_version: 1.10.0

      - name: Install cloudflared
        run: |
          curl -fsSL https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o cloudflared
          chmod +x cloudflared
          sudo mv cloudflared /usr/local/bin/

      - name: Generate SSH key for server access
        id: ssh_key
        env:
          GH_TOKEN: ${{ secrets.GH_SECRETS_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          # Ensure .ssh directory exists
          mkdir -p ~/.ssh
          
          # Check if SSH key already exists in secrets
          if [ -n "${{ secrets.SSH_PRIVATE_KEY }}" ]; then
            echo "✅ SSH key already exists in secrets - reusing"
            echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
            echo "${{ secrets.SSH_PUBLIC_KEY }}" > ~/.ssh/id_ed25519.pub
            chmod 600 ~/.ssh/id_ed25519
            chmod 644 ~/.ssh/id_ed25519.pub
            echo "ssh_key_created=false" >> $GITHUB_OUTPUT
          else
            echo "🔑 Generating new SSH key..."
            mkdir -p ~/.ssh
            ssh-keygen -t ed25519 -f ~/.ssh/id_ed25519 -N "" -C "nexus-stack"
            chmod 600 ~/.ssh/id_ed25519
            chmod 644 ~/.ssh/id_ed25519.pub
            
            # Save SSH Private Key as GitHub Secret
            # Note: Public Key is not stored as secret - it can be derived from private key
            SSH_PRIVATE_KEY=$(cat ~/.ssh/id_ed25519)
            
            if [ -n "$GH_TOKEN" ]; then
              echo "🔐 Saving SSH keys to GitHub Secrets..."
              # Note: We only save the Private Key as a secret. 
              # The Public Key is passed as an output and not stored as a secret to avoid 
              # "Skip output... contains secret" warnings in GitHub Actions.
              if gh secret set SSH_PRIVATE_KEY -b "$SSH_PRIVATE_KEY" 2>/dev/null; then
                echo "✅ SSH Private Key saved to GitHub Secrets"
                echo "ssh_key_created=true" >> $GITHUB_OUTPUT
              else
                echo "⚠️  Failed to save SSH keys - GH_SECRETS_TOKEN may need 'repo' scope"
                echo "ssh_key_created=false" >> $GITHUB_OUTPUT
              fi
            else
              echo "⚠️  GH_SECRETS_TOKEN not set - SSH keys not saved"
              echo "ssh_key_created=false" >> $GITHUB_OUTPUT
            fi
          fi
          
          # Export public key for output (named ssh_pubkey to avoid GitHub Actions secret warning)
          echo "ssh_pubkey=$(cat ~/.ssh/id_ed25519.pub)" >> $GITHUB_OUTPUT

          # Export private key for output (for initial-setup passthrough to spin-up)
          # Note: Don't mask private key here - masking prevents it from being
          # passed as workflow output (GitHub blocks outputs containing masked values)
          # AND can corrupt R2 credentials if base64 substrings match.
          # The key will be masked by the receiving workflow (spin-up.yml) when used
          {
            echo "ssh_private_key<<SSHEOF"
            cat ~/.ssh/id_ed25519
            echo "SSHEOF"
          } >> $GITHUB_OUTPUT

      - name: Compute resource prefix
        id: prefix
        run: |
          # Derive resource prefix from domain (e.g., stefanko.ch -> nexus-stefanko-ch)
          DOMAIN="${{ secrets.DOMAIN }}"
          RESOURCE_PREFIX="nexus-${DOMAIN//./-}"
          PROJECT_NAME="${RESOURCE_PREFIX}-control"
          echo "resource_prefix=$RESOURCE_PREFIX" >> $GITHUB_OUTPUT
          echo "project_name=$PROJECT_NAME" >> $GITHUB_OUTPUT
          echo "Resource prefix: $RESOURCE_PREFIX"
          echo "Project name: $PROJECT_NAME"

      - name: Generate config.tfvars
        run: |
          # Control Plane config (emails from secrets)
          cat > tofu/control-plane/config.tfvars << EOF
          server_type     = "cax31"
          server_location = "fsn1"
          domain          = "${{ secrets.DOMAIN }}"
          admin_email     = "${{ secrets.TF_VAR_admin_email }}"
          user_email      = "${{ secrets.TF_VAR_user_email }}"
          github_owner    = "${{ github.repository_owner }}"
          github_repo     = "${{ github.event.repository.name }}"
          EOF
          sed -i 's/^          //' tofu/control-plane/config.tfvars

      - name: Check if R2 credentials exist
        id: check_r2
        run: |
          if [ -n "${{ secrets.R2_ACCESS_KEY_ID }}" ] && [ -n "${{ secrets.R2_SECRET_ACCESS_KEY }}" ]; then
            echo "r2_exists=true" >> $GITHUB_OUTPUT
            echo "✅ R2 credentials found in secrets"
          else
            echo "r2_exists=false" >> $GITHUB_OUTPUT
            echo "📦 No R2 credentials - will create new ones"
          fi

      - name: Initialize R2 (first-time setup)
        if: steps.check_r2.outputs.r2_exists == 'false'
        id: init_r2
        env:
          GH_TOKEN: ${{ secrets.GH_SECRETS_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          echo "🪣 Creating R2 bucket and credentials..."
          r2_saved=false
          
          # Run the init script
          chmod +x scripts/init-r2-state.sh
          if ! ./scripts/init-r2-state.sh; then
            echo "❌ init-r2-state.sh script failed"
            exit 1
          fi
          
          # Verify credentials file was created
          if [ ! -f tofu/.r2-credentials ]; then
            echo "❌ R2 credentials file not found after running init script"
            echo "   Expected location: tofu/.r2-credentials"
            echo "   Current directory: $(pwd)"
            echo "   Contents of tofu/ directory:"
            ls -la tofu/ 2>/dev/null || echo "   (tofu/ directory does not exist)"
            exit 1
          fi
          
          # Read the generated credentials
          if [ -f tofu/.r2-credentials ]; then
            source tofu/.r2-credentials
            
            # Check if we have a token to auto-save secrets
            if [ -n "$GH_TOKEN" ]; then
              echo "🔐 Auto-saving R2 credentials as GitHub Secrets..."
              
              SECRET_ERROR=""
              if ! gh secret set R2_ACCESS_KEY_ID -b "$R2_ACCESS_KEY_ID" 2>&1 | tee /tmp/gh-secret-access.log; then
                SECRET_ERROR=$(cat /tmp/gh-secret-access.log 2>/dev/null || echo "Unknown error")
              fi
              
              if [ -z "$SECRET_ERROR" ]; then
                if ! gh secret set R2_SECRET_ACCESS_KEY -b "$R2_SECRET_ACCESS_KEY" 2>&1 | tee /tmp/gh-secret-secret.log; then
                  SECRET_ERROR=$(cat /tmp/gh-secret-secret.log 2>/dev/null || echo "Unknown error")
                fi
              fi
              
              if [ -z "$SECRET_ERROR" ]; then
                echo "✅ R2 credentials saved to GitHub Secrets automatically!"
                echo ""
                echo "Future deployments will use these credentials."
                r2_saved=true
              else
                echo "⚠️  Failed to auto-save secrets: $SECRET_ERROR"
                echo ""
                echo "Please save these credentials manually in GitHub Secrets:"
                echo "  R2_ACCESS_KEY_ID=$R2_ACCESS_KEY_ID"
                echo "  R2_SECRET_ACCESS_KEY=*** (check workflow logs or tofu/.r2-credentials file)"
                echo ""
                echo "Or configure GH_SECRETS_TOKEN with 'repo' scope and 'write:secrets' permission"
              fi
            else
              echo ""
              echo "╔══════════════════════════════════════════════════════════════════════════════╗"
              echo "║  ⚠️  GH_SECRETS_TOKEN not configured - manual setup required                ║"
              echo "╠══════════════════════════════════════════════════════════════════════════════╣"
              echo "║                                                                              ║"
              echo "║  Please save these credentials manually in GitHub Secrets:                  ║"
              echo "║  R2_ACCESS_KEY_ID=$R2_ACCESS_KEY_ID"
              echo "║  R2_SECRET_ACCESS_KEY=$R2_SECRET_ACCESS_KEY"
              echo "║                                                                              ║"
              echo "║  To enable auto-saving, create a Personal Access Token:                     ║"
              echo "║  GitHub → Settings → Developer settings → Personal access tokens            ║"
              echo "║  Required scope: 'repo' (or fine-grained with 'Secrets' permission)         ║"
              echo "║  Save as: GH_SECRETS_TOKEN                                                  ║"
              echo "║                                                                              ║"
              echo "╚══════════════════════════════════════════════════════════════════════════════╝"
            fi
            
            echo "r2_saved=$r2_saved" >> $GITHUB_OUTPUT
            
            # Export for this run
            echo "r2_access_key=$R2_ACCESS_KEY_ID" >> $GITHUB_OUTPUT
            echo "r2_secret_key=$R2_SECRET_ACCESS_KEY" >> $GITHUB_OUTPUT
          else
            echo "❌ Failed to create R2 credentials"
            exit 1
          fi

      - name: Create R2 credentials from secrets
        if: steps.check_r2.outputs.r2_exists == 'true'
        run: |
          mkdir -p tofu
          # Trim whitespace and newlines from secrets to avoid auth issues
          R2_ACCESS_KEY_ID=$(echo -n "${{ secrets.R2_ACCESS_KEY_ID }}" | tr -d '[:space:]')
          R2_SECRET_ACCESS_KEY=$(echo -n "${{ secrets.R2_SECRET_ACCESS_KEY }}" | tr -d '[:space:]')
          
          # Generate dynamic bucket name from domain
          BUCKET_NAME=$(echo "${{ secrets.DOMAIN }}" | tr '.' '-')-terraform-state
          echo "📦 Using bucket: $BUCKET_NAME"
          
          cat > tofu/.r2-credentials << EOF
          R2_ACCESS_KEY_ID="${R2_ACCESS_KEY_ID}"
          R2_SECRET_ACCESS_KEY="${R2_SECRET_ACCESS_KEY}"
          EOF
          sed -i 's/^          //' tofu/.r2-credentials

          cat > tofu/backend.hcl << EOF
          endpoints = {
            s3 = "https://${{ secrets.CLOUDFLARE_ACCOUNT_ID }}.r2.cloudflarestorage.com"
          }
          bucket = "${BUCKET_NAME}"
          EOF
          sed -i 's/^          //' tofu/backend.hcl
          
          # Debug: Verify credentials are set (without exposing values)
          echo "✅ R2 credentials file created"
          echo "   R2_ACCESS_KEY_ID length: ${#R2_ACCESS_KEY_ID}"
          echo "   R2_SECRET_ACCESS_KEY length: ${#R2_SECRET_ACCESS_KEY}"

      - name: Validate R2 credentials
        if: steps.check_r2.outputs.r2_exists == 'true'
        id: validate_r2
        env:
          GH_TOKEN: ${{ secrets.GH_SECRETS_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          source tofu/.r2-credentials
          export AWS_ACCESS_KEY_ID="$R2_ACCESS_KEY_ID"
          export AWS_SECRET_ACCESS_KEY="$R2_SECRET_ACCESS_KEY"

          R2_ENDPOINT="https://${{ secrets.CLOUDFLARE_ACCOUNT_ID }}.r2.cloudflarestorage.com"

          echo "🔍 Validating R2 credentials via list-buckets against $R2_ENDPOINT..."
          # Use if-else to prevent set -e from killing the script on aws failure
          if VALIDATION=$(aws s3api list-buckets --endpoint-url="$R2_ENDPOINT" --region auto 2>&1); then
            echo "✅ R2 credentials are valid"
            echo "r2_valid=true" >> $GITHUB_OUTPUT
          else
            VALIDATION_STATUS=$?
            echo "❌ R2 credentials are invalid (exit code $VALIDATION_STATUS)"
            echo "$VALIDATION"
            echo "r2_valid=false" >> $GITHUB_OUTPUT

            # Delete stale GitHub Secrets so init-r2-state.sh can recreate them
            if [ -n "$GH_TOKEN" ]; then
              gh secret delete R2_ACCESS_KEY_ID 2>/dev/null || true
              gh secret delete R2_SECRET_ACCESS_KEY 2>/dev/null || true
              echo "🗑️  Stale R2 secrets deleted from GitHub"
            fi
          fi

      - name: Recreate R2 credentials (invalid token detected)
        if: steps.validate_r2.outputs.r2_valid == 'false'
        env:
          GH_TOKEN: ${{ secrets.GH_SECRETS_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          echo "🔄 Recreating R2 token and credentials..."
          rm -f tofu/.r2-credentials  # Remove stale credentials so init script creates new token
          chmod +x scripts/init-r2-state.sh
          if ! ./scripts/init-r2-state.sh; then
            echo "❌ init-r2-state.sh failed"
            exit 1
          fi

          # Save new credentials to GitHub Secrets
          if [ -f tofu/.r2-credentials ] && [ -n "$GH_TOKEN" ]; then
            source tofu/.r2-credentials
            gh secret set R2_ACCESS_KEY_ID -b "$R2_ACCESS_KEY_ID" 2>/dev/null || true
            gh secret set R2_SECRET_ACCESS_KEY -b "$R2_SECRET_ACCESS_KEY" 2>/dev/null || true
            echo "✅ New R2 credentials saved to GitHub Secrets"
          fi

      - name: Export R2 credentials for spin-up workflow
        id: r2_credentials
        run: |
          # Check if credentials file exists (from either init_r2 or Create R2 credentials step)
          if [ ! -f tofu/.r2-credentials ]; then
            echo "❌ R2 credentials file not found!"
            echo "   Expected location: tofu/.r2-credentials"
            exit 1
          fi
          
          source tofu/.r2-credentials
          
          # Verify credentials were loaded
          if [ -z "$R2_ACCESS_KEY_ID" ] || [ -z "$R2_SECRET_ACCESS_KEY" ]; then
            echo "❌ R2 credentials are empty after sourcing file!"
            exit 1
          fi
          
          # Note: Don't mask credentials here - masking prevents them from being
          # passed as workflow outputs (GitHub blocks outputs containing masked values)
          # The credentials will be masked by the receiving workflow when used
          # Export as outputs for the calling workflow
          echo "r2_access_key_id=$R2_ACCESS_KEY_ID" >> $GITHUB_OUTPUT
          echo "r2_secret_access_key=$R2_SECRET_ACCESS_KEY" >> $GITHUB_OUTPUT
          echo "✅ R2 credentials exported for spin-up workflow"

      - name: Ensure R2 state bucket exists
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          # After a destroy-all the R2 state bucket may have been deleted while
          # credentials still exist in GitHub Secrets. Ensure the bucket is present
          # before tofu init attempts to use it.
          BUCKET_NAME=$(echo "${{ secrets.DOMAIN }}" | tr '.' '-')-terraform-state
          R2_API="https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}"

          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            "${R2_API}/r2/buckets/${BUCKET_NAME}" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}")

          if [ "$HTTP_CODE" = "200" ]; then
            echo "✅ R2 state bucket exists: $BUCKET_NAME"
          elif [ "$HTTP_CODE" = "404" ]; then
            echo "  Bucket not found — creating $BUCKET_NAME..."
            CREATE_RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "${R2_API}/r2/buckets" \
              -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
              -H "Content-Type: application/json" \
              -d "{\"name\": \"${BUCKET_NAME}\"}")
            CREATE_HTTP=$(echo "$CREATE_RESPONSE" | tail -n1)
            CREATE_BODY=$(echo "$CREATE_RESPONSE" | sed '$d')
            if [ "$CREATE_HTTP" != "200" ] || ! echo "$CREATE_BODY" | jq -e '.success == true' >/dev/null 2>&1; then
              echo "❌ Failed to create R2 state bucket (HTTP $CREATE_HTTP)"
              echo "$CREATE_BODY" | jq -r '.errors[0].message // "unknown"' 2>/dev/null
              exit 1
            fi
            echo "✅ R2 state bucket created: $BUCKET_NAME"
          else
            echo "❌ Unexpected HTTP $HTTP_CODE when checking R2 state bucket"
            exit 1
          fi

      - name: Initialize OpenTofu for Control Plane
        run: |
          cd tofu/control-plane
          source ../.r2-credentials
          export AWS_ACCESS_KEY_ID="$R2_ACCESS_KEY_ID"
          export AWS_SECRET_ACCESS_KEY="$R2_SECRET_ACCESS_KEY"

          # Create backend config for control-plane with dynamic bucket name
          BUCKET_NAME=$(echo "${{ secrets.DOMAIN }}" | tr '.' '-')-terraform-state
          cat > backend.hcl << EOF
          endpoints = {
            s3 = "https://${{ secrets.CLOUDFLARE_ACCOUNT_ID }}.r2.cloudflarestorage.com"
          }
          bucket = "${BUCKET_NAME}"
          EOF
          sed -i 's/^          //' backend.hcl

          tofu init -backend-config=backend.hcl

      - name: Clean up orphaned Hetzner Object Storage buckets
        run: |
          # If destroy-all cleared Terraform state but failed to delete the Hetzner
          # Object Storage buckets, the next initial-setup fails because the minio
          # provider tries to CREATE buckets that already exist. Stale buckets from
          # a previous deployment have no value on a fresh setup, so delete them here
          # to let Terraform create them cleanly.

          if [ -z "${{ secrets.HETZNER_OBJECT_STORAGE_ACCESS_KEY }}" ]; then
            echo "  ℹ️  Hetzner Object Storage not configured - skipping"
            exit 0
          fi

          DOMAIN="${{ secrets.DOMAIN }}"
          RESOURCE_PREFIX="nexus-${DOMAIN//./-}"
          HZ_ENDPOINT="https://fsn1.your-objectstorage.com"

          HZ_ACCESS_KEY="${{ secrets.HETZNER_OBJECT_STORAGE_ACCESS_KEY }}"
          HZ_SECRET_KEY="${{ secrets.HETZNER_OBJECT_STORAGE_SECRET_KEY }}"

          cd tofu/control-plane
          source ../.r2-credentials
          # R2 credentials for tofu state commands
          export AWS_ACCESS_KEY_ID="$R2_ACCESS_KEY_ID"
          export AWS_SECRET_ACCESS_KEY="$R2_SECRET_ACCESS_KEY"

          for BUCKET in "${RESOURCE_PREFIX}-lakefs" "${RESOURCE_PREFIX}"; do
            RESOURCE=$([ "$BUCKET" = "${RESOURCE_PREFIX}-lakefs" ] \
              && echo "minio_s3_bucket.lakefs[0]" \
              || echo "minio_s3_bucket.general[0]")
            RES_NAME=$([ "$BUCKET" = "${RESOURCE_PREFIX}-lakefs" ] && echo "lakefs" || echo "general")

            if tofu state show "$RESOURCE" >/dev/null 2>&1; then
              # Resource is in state - check if it is tainted (must be replaced)
              INSTANCE_STATUS=$(tofu state pull 2>/dev/null | jq -r \
                --arg name "$RES_NAME" \
                '.resources[]? | select(.type == "minio_s3_bucket" and .name == $name) | .instances[]?.status // "ok"' \
                2>/dev/null | head -1 || echo "ok")

              if [ "$INSTANCE_STATUS" != "tainted" ]; then
                echo "  $BUCKET: in state and healthy - skipping"
                continue
              fi

              echo "  $BUCKET: in state but tainted - removing for clean replacement..."
              AWS_ACCESS_KEY_ID="$HZ_ACCESS_KEY" \
              AWS_SECRET_ACCESS_KEY="$HZ_SECRET_KEY" \
              AWS_DEFAULT_REGION="eu-central-1" \
              aws s3 rm "s3://${BUCKET}" --recursive \
                --endpoint-url="$HZ_ENDPOINT" 2>/dev/null || true
              AWS_ACCESS_KEY_ID="$HZ_ACCESS_KEY" \
              AWS_SECRET_ACCESS_KEY="$HZ_SECRET_KEY" \
              AWS_DEFAULT_REGION="eu-central-1" \
              aws s3api delete-bucket --bucket "$BUCKET" \
                --endpoint-url="$HZ_ENDPOINT" 2>/dev/null || true
              tofu state rm "$RESOURCE" 2>/dev/null || true
              echo "  ✅ $BUCKET removed from state and Hetzner - Terraform will recreate it"
              continue
            fi

            # Resource not in state - check if bucket exists on Hetzner
            if ! AWS_ACCESS_KEY_ID="$HZ_ACCESS_KEY" \
               AWS_SECRET_ACCESS_KEY="$HZ_SECRET_KEY" \
               AWS_DEFAULT_REGION="eu-central-1" \
               aws s3api head-bucket --bucket "$BUCKET" \
               --endpoint-url="$HZ_ENDPOINT" 2>/dev/null; then
              echo "  $BUCKET: does not exist - skipping"
              continue
            fi

            # Bucket exists but not in state — import it (preserves data)
            echo "  $BUCKET: found on Hetzner, importing into state..."
            if tofu import -var-file=config.tfvars "$RESOURCE" "$BUCKET" 2>/dev/null; then
              echo "  ✅ $BUCKET imported into state (data preserved)"
            else
              echo "  ⚠️  Import failed for $BUCKET - tofu apply will handle it"
            fi
          done

      - name: Import existing persistent volume (if preserved from previous destroy)
        env:
          HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
        run: |
          cd tofu/control-plane
          source ../.r2-credentials
          export AWS_ACCESS_KEY_ID="$R2_ACCESS_KEY_ID"
          export AWS_SECRET_ACCESS_KEY="$R2_SECRET_ACCESS_KEY"

          # Check if volume is already in state
          if tofu state show hcloud_volume.persistent >/dev/null 2>&1; then
            echo "✅ Persistent volume already in state"
            exit 0
          fi

          # Look for existing volume in Hetzner by name
          DOMAIN="${{ secrets.DOMAIN }}"
          VOLUME_NAME="nexus-${DOMAIN//./-}-data"
          echo "🔍 Searching for existing volume: $VOLUME_NAME"

          VOLUME_ID=$(curl -s -H "Authorization: Bearer $HCLOUD_TOKEN" \
            "https://api.hetzner.cloud/v1/volumes?name=$VOLUME_NAME" | \
            jq -r '.volumes[0].id // empty' 2>/dev/null || echo "")

          if [ -n "$VOLUME_ID" ] && [ "$VOLUME_ID" != "null" ]; then
            echo "💾 Found existing volume (ID: $VOLUME_ID) - importing into state..."
            if tofu import -var-file=config.tfvars hcloud_volume.persistent "$VOLUME_ID"; then
              echo "✅ Persistent volume imported successfully (data preserved)"
            else
              echo "⚠️  Import failed - a new volume will be created"
            fi
          else
            echo "ℹ️  No existing volume found - will create new one"
          fi

      - name: Import existing KV namespace (if preserved from previous destroy)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          cd tofu/control-plane
          source ../.r2-credentials
          export AWS_ACCESS_KEY_ID="$R2_ACCESS_KEY_ID"
          export AWS_SECRET_ACCESS_KEY="$R2_SECRET_ACCESS_KEY"

          if tofu state show cloudflare_workers_kv_namespace.config >/dev/null 2>&1; then
            echo "✅ KV namespace already in state"
            exit 0
          fi

          DOMAIN="${{ secrets.DOMAIN }}"
          KV_TITLE="nexus-${DOMAIN//./-}-config"
          echo "🔍 Searching for existing KV namespace: $KV_TITLE"

          KV_ID=$(curl -sf "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/storage/kv/namespaces" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" | \
            jq -r --arg title "$KV_TITLE" '.result[] | select(.title==$title) | .id // empty' 2>/dev/null || echo "")

          if [ -n "$KV_ID" ]; then
            echo "💾 Found existing KV namespace (ID: $KV_ID) - importing into state..."
            if tofu import -var-file=config.tfvars cloudflare_workers_kv_namespace.config "${CLOUDFLARE_ACCOUNT_ID}/${KV_ID}"; then
              echo "✅ KV namespace imported (Databricks config preserved)"
            else
              echo "⚠️  Import failed - a new KV namespace will be created"
            fi
          else
            echo "ℹ️  No existing KV namespace found - will create new one"
          fi

      - name: Pre-create Hetzner Object Storage buckets (avoids provider ACL issues)
        run: |
          if [ -z "${{ secrets.HETZNER_OBJECT_STORAGE_ACCESS_KEY }}" ]; then
            echo "ℹ️  Hetzner Object Storage not configured - skipping"
            exit 0
          fi

          cd tofu/control-plane
          source ../.r2-credentials
          export AWS_ACCESS_KEY_ID="$R2_ACCESS_KEY_ID"
          export AWS_SECRET_ACCESS_KEY="$R2_SECRET_ACCESS_KEY"

          DOMAIN="${{ secrets.DOMAIN }}"
          RESOURCE_PREFIX="nexus-${DOMAIN//./-}"
          HZ_ENDPOINT="https://${{ secrets.HETZNER_OBJECT_STORAGE_SERVER || 'fsn1.your-objectstorage.com' }}"
          HZ_AK="${{ secrets.HETZNER_OBJECT_STORAGE_ACCESS_KEY }}"
          HZ_SK="${{ secrets.HETZNER_OBJECT_STORAGE_SECRET_KEY }}"

          for BUCKET in "${RESOURCE_PREFIX}-lakefs" "${RESOURCE_PREFIX}"; do
            # Skip if already in state
            RESOURCE_NAME="minio_s3_bucket.$([ "$BUCKET" = "${RESOURCE_PREFIX}-lakefs" ] && echo 'lakefs[0]' || echo 'general[0]')"
            if tofu state show "$RESOURCE_NAME" >/dev/null 2>&1; then
              echo "✅ $BUCKET already in state"
              continue
            fi

            # Create bucket via AWS CLI (no ACL/policy issues)
            if AWS_ACCESS_KEY_ID="$HZ_AK" AWS_SECRET_ACCESS_KEY="$HZ_SK" \
               aws s3api head-bucket --bucket "$BUCKET" --endpoint-url "$HZ_ENDPOINT" 2>/dev/null; then
              echo "✅ $BUCKET already exists in Hetzner"
            else
              echo "🪣 Creating $BUCKET (endpoint: $HZ_ENDPOINT)..."
              CREATE_RC=0
              CREATE_OUTPUT=$(AWS_ACCESS_KEY_ID="$HZ_AK" AWS_SECRET_ACCESS_KEY="$HZ_SK" \
                 aws s3api create-bucket --bucket "$BUCKET" --endpoint-url "$HZ_ENDPOINT" 2>&1) || CREATE_RC=$?
              if [ "$CREATE_RC" -eq 0 ]; then
                echo "✅ $BUCKET created"
              elif echo "$CREATE_OUTPUT" | grep -q "BucketAlreadyOwnedByYou\|BucketAlreadyExists"; then
                echo "✅ $BUCKET already exists"
              else
                echo "⚠️  Failed to create $BUCKET: $CREATE_OUTPUT"
                continue
              fi
            fi

            # Import into state so tofu apply doesn't try to create (and fail on ACL)
            IMPORT_RESOURCE="minio_s3_bucket.$([ "$BUCKET" = "${RESOURCE_PREFIX}-lakefs" ] && echo 'lakefs[0]' || echo 'general[0]')"
            if tofu import -var-file=config.tfvars "$IMPORT_RESOURCE" "$BUCKET" 2>/dev/null; then
              echo "✅ $BUCKET imported into state"
            else
              echo "⚠️  Import failed for $BUCKET - tofu apply will handle it"
            fi
          done

      - name: Deploy Control Plane infrastructure
        run: |
          cd tofu/control-plane
          source ../.r2-credentials
          export AWS_ACCESS_KEY_ID="$R2_ACCESS_KEY_ID"
          export AWS_SECRET_ACCESS_KEY="$R2_SECRET_ACCESS_KEY"

          echo "🏗️  Deploying Control Plane infrastructure (Cloudflare Pages + Worker)..."
          tofu apply -var-file=config.tfvars -auto-approve

          echo "✅ Control Plane infrastructure deployed"

      - name: Create R2 datalake bucket and credentials
        id: r2_data
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          GH_TOKEN: ${{ secrets.GH_SECRETS_TOKEN }}
          DOMAIN: ${{ secrets.DOMAIN }}
        run: |
          DOMAIN_SLUG=$(echo "$DOMAIN" | tr '.' '-')
          BUCKET_NAME="nexus-${DOMAIN_SLUG}-data"
          R2_API="https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}"
          TOKEN_NAME="nexus-r2-data-${DOMAIN_SLUG}"

          echo "🪣 Setting up R2 datalake bucket: $BUCKET_NAME"

          # Check if bucket already exists
          BUCKET_CHECK=$(curl -s -w "\n%{http_code}" \
            "${R2_API}/r2/buckets/${BUCKET_NAME}" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}")
          HTTP_CODE=$(echo "$BUCKET_CHECK" | tail -n1)

          if [ "$HTTP_CODE" = "200" ]; then
            echo "  ✅ Bucket already exists"
          elif [ "$HTTP_CODE" = "404" ]; then
            echo "  Creating bucket..."
            CREATE_RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "${R2_API}/r2/buckets" \
              -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
              -H "Content-Type: application/json" \
              -d "{\"name\": \"${BUCKET_NAME}\"}")
            CREATE_HTTP=$(echo "$CREATE_RESPONSE" | tail -n1)
            CREATE_BODY=$(echo "$CREATE_RESPONSE" | sed '$d')
            if [ "$CREATE_HTTP" != "200" ]; then
              echo "  ❌ Bucket creation failed (HTTP $CREATE_HTTP): $(echo "$CREATE_BODY" | jq -r '.errors[0].message // "unknown"')"
              exit 1
            fi
            if echo "$CREATE_BODY" | jq -e '.success == true' >/dev/null 2>&1; then
              echo "  ✅ Bucket created"
            else
              echo "  ❌ Bucket creation failed: $(echo "$CREATE_BODY" | jq -r '.errors[0].message // "unknown"')"
              exit 1
            fi
          else
            echo "  ❌ Failed to check bucket existence (HTTP $HTTP_CODE)"
            exit 1
          fi

          # Check if API token already exists (reuse if so)
          EXISTING_TOKEN_ID=$(curl -s "https://api.cloudflare.com/client/v4/user/tokens?per_page=100" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            | jq -r --arg name "$TOKEN_NAME" '.result[] | select(.name == $name) | .id' | head -1)

          if [ -n "$EXISTING_TOKEN_ID" ]; then
            echo "  Deleting existing R2 data token to recreate..."
            curl -sf -X DELETE "https://api.cloudflare.com/client/v4/user/tokens/$EXISTING_TOKEN_ID" \
              -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" >/dev/null 2>&1 || true
          fi

          # Create dedicated API token for data bucket
          echo "  Creating R2 data API token..."
          TOKEN_RESULT=$(curl -s -X POST "https://api.cloudflare.com/client/v4/user/tokens" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{
              \"name\": \"${TOKEN_NAME}\",
              \"policies\": [{
                \"effect\": \"allow\",
                \"resources\": {\"com.cloudflare.api.account.${CLOUDFLARE_ACCOUNT_ID}\": \"*\"},
                \"permission_groups\": [{
                  \"id\": \"bf7481a1826f439697cb59a20b22293e\",
                  \"name\": \"Workers R2 Storage Write\"
                }]
              }]
            }")

          TOKEN_ID=$(echo "$TOKEN_RESULT" | jq -r '.result.id // empty')
          TOKEN_VALUE=$(echo "$TOKEN_RESULT" | jq -r '.result.value // empty')

          if [ -z "$TOKEN_ID" ] || [ -z "$TOKEN_VALUE" ]; then
            echo "  ❌ Failed to create R2 data token"
            echo "  Response from Cloudflare API:"
            echo "$TOKEN_RESULT"
            exit 1
          fi

          # Derive S3-compatible credentials
          SECRET_KEY=$(echo -n "$TOKEN_VALUE" | openssl dgst -sha256 | awk '{print $2}')

          echo "  ✅ R2 data token created"

          # Store credentials as GitHub Secrets
          if [ -n "$GH_TOKEN" ]; then
            echo "  Saving R2 data credentials to GitHub Secrets..."
            SAVE_FAILED=0

            if ! gh secret set R2_DATA_ACCESS_KEY_ID -b "$TOKEN_ID"; then
              echo "  ❌ Failed to save R2_DATA_ACCESS_KEY_ID to GitHub Secrets"
              SAVE_FAILED=1
            fi
            if ! gh secret set R2_DATA_SECRET_ACCESS_KEY -b "$SECRET_KEY"; then
              echo "  ❌ Failed to save R2_DATA_SECRET_ACCESS_KEY to GitHub Secrets"
              SAVE_FAILED=1
            fi
            if ! gh secret set R2_DATA_BUCKET -b "$BUCKET_NAME"; then
              echo "  ❌ Failed to save R2_DATA_BUCKET to GitHub Secrets"
              SAVE_FAILED=1
            fi

            if [ "$SAVE_FAILED" -eq 0 ]; then
              echo "  ✅ R2 data credentials saved to GitHub Secrets"
            else
              echo "  ❌ One or more R2 data credentials could not be saved to GitHub Secrets"
              exit 1
            fi
          else
            echo "  ⚠️  GH_SECRETS_TOKEN not set - R2 data credentials not saved to GitHub Secrets"
            echo "     Credentials are still available for this run via workflow outputs."
          fi

          # Set outputs for downstream jobs (initial-setup passes these to spin-up)
          echo "r2_data_access_key=$TOKEN_ID" >> "$GITHUB_OUTPUT"
          echo "r2_data_secret_key=$SECRET_KEY" >> "$GITHUB_OUTPUT"
          echo "r2_data_bucket=$BUCKET_NAME" >> "$GITHUB_OUTPUT"

      - name: Set Scheduled Teardown Worker secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          GITHUB_TOKEN: ${{ secrets.GH_SECRETS_TOKEN }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          ADMIN_EMAIL: ${{ secrets.TF_VAR_admin_email }}
          DOMAIN: ${{ secrets.DOMAIN }}
        run: |
          echo "⚙️  Setting Scheduled Teardown Worker secrets..."
          # Derive worker name from domain (must match Terraform naming: ${local.resource_prefix}-worker)
          WORKER_NAME="nexus-${DOMAIN//./-}-worker"
          GITHUB_OWNER="${{ github.repository_owner }}"
          GITHUB_REPO="${{ github.event.repository.name }}"
          
          # Set secrets for the Worker (different from Pages!)
          echo "  Setting GITHUB_TOKEN..."
          echo "$GITHUB_TOKEN" | npx wrangler@4 secret put GITHUB_TOKEN --name="$WORKER_NAME" || echo "⚠️  Failed"
          
          echo "  Setting GITHUB_OWNER..."
          echo "$GITHUB_OWNER" | npx wrangler@4 secret put GITHUB_OWNER --name="$WORKER_NAME" || echo "⚠️  Failed"
          
          echo "  Setting GITHUB_REPO..."
          echo "$GITHUB_REPO" | npx wrangler@4 secret put GITHUB_REPO --name="$WORKER_NAME" || echo "⚠️  Failed"
          
          echo "  Setting DOMAIN..."
          echo "$DOMAIN" | npx wrangler@4 secret put DOMAIN --name="$WORKER_NAME" || echo "⚠️  Failed"
          
          if [ -n "$RESEND_API_KEY" ]; then
            echo "  Setting RESEND_API_KEY..."
            echo "$RESEND_API_KEY" | npx wrangler@4 secret put RESEND_API_KEY --name="$WORKER_NAME" || echo "⚠️  Failed"
          fi
          
          if [ -n "$ADMIN_EMAIL" ]; then
            echo "  Setting ADMIN_EMAIL..."
            echo "$ADMIN_EMAIL" | npx wrangler@4 secret put ADMIN_EMAIL --name="$WORKER_NAME" || echo "⚠️  Failed"
          fi
          
          echo "✅ Worker secrets configured"

      - name: Set Control Plane environment variables and secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          GITHUB_TOKEN: ${{ secrets.GH_SECRETS_TOKEN }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          ADMIN_EMAIL: ${{ secrets.TF_VAR_admin_email }}
          USER_EMAIL: ${{ secrets.TF_VAR_user_email }}
          DOMAIN: ${{ secrets.DOMAIN }}
        run: |
          echo "⚙️  Setting Control Plane environment variables and secrets..."
          PROJECT_NAME="${{ steps.prefix.outputs.project_name }}"
          GITHUB_OWNER="${{ github.repository_owner }}"
          GITHUB_REPO="${{ github.event.repository.name }}"
          
          echo "  GITHUB_OWNER: $GITHUB_OWNER"
          echo "  GITHUB_REPO: $GITHUB_REPO"
          echo "  DOMAIN: $DOMAIN"
          
          # Set all variables as Secrets via wrangler
          # Note: Terraform sets environment_variables in Pages project config,
          # but wrangler pages deploy doesn't use those - we need to set them as secrets
          # Secrets work for both production and preview environments automatically
          
          if [ -n "$GITHUB_TOKEN" ]; then
            echo "  Setting GITHUB_TOKEN secret..."
            if ! echo "$GITHUB_TOKEN" | npx wrangler@4 pages secret put GITHUB_TOKEN \
              --project-name="$PROJECT_NAME" 2>&1; then
              echo "⚠️  Failed to set GITHUB_TOKEN secret (check token validity and project name)"
            fi
          else
            echo "⚠️  GITHUB_TOKEN not provided - Control Plane will not work!"
          fi
          
          echo "  Setting GITHUB_OWNER secret..."
          echo "$GITHUB_OWNER" | npx wrangler@4 pages secret put GITHUB_OWNER \
            --project-name="$PROJECT_NAME" || echo "⚠️  Failed to set GITHUB_OWNER (may already be set)"
          
          echo "  Setting GITHUB_REPO secret..."
          echo "$GITHUB_REPO" | npx wrangler@4 pages secret put GITHUB_REPO \
            --project-name="$PROJECT_NAME" || echo "⚠️  Failed to set GITHUB_REPO (may already be set)"
          
          # Set DOMAIN (required for service URLs and email sender)
          if [ -n "$DOMAIN" ]; then
            echo "  Setting DOMAIN secret..."
            echo "$DOMAIN" | npx wrangler@4 pages secret put DOMAIN \
              --project-name="$PROJECT_NAME" || echo "⚠️  Failed to set DOMAIN"
          else
            echo "⚠️  DOMAIN not provided - Service URLs will show 'unknown'!"
          fi
          
          # Set RESEND_API_KEY for email sending (optional)
          if [ -n "$RESEND_API_KEY" ]; then
            echo "  Setting RESEND_API_KEY secret..."
            echo "$RESEND_API_KEY" | npx wrangler@4 pages secret put RESEND_API_KEY \
              --project-name="$PROJECT_NAME" || echo "⚠️  Failed to set RESEND_API_KEY"
          else
            echo "  ⏭️  RESEND_API_KEY not provided - email sending will be disabled"
          fi
          
          # Set ADMIN_EMAIL for email sending (optional)
          if [ -n "$ADMIN_EMAIL" ]; then
            echo "  Setting ADMIN_EMAIL secret..."
            echo "$ADMIN_EMAIL" | npx wrangler@4 pages secret put ADMIN_EMAIL \
              --project-name="$PROJECT_NAME" || echo "⚠️  Failed to set ADMIN_EMAIL"
          else
            echo "  ⏭️  ADMIN_EMAIL not provided - email sending will be disabled"
          fi
          
          # Set USER_EMAIL for email sending (optional)
          if [ -n "$USER_EMAIL" ]; then
            echo "  Setting USER_EMAIL secret..."
            echo "$USER_EMAIL" | npx wrangler@4 pages secret put USER_EMAIL \
              --project-name="$PROJECT_NAME" || echo "⚠️  Failed to set USER_EMAIL"
          else
            echo "  ⏭️  USER_EMAIL not provided - emails go to admin only"
          fi
          
          # Set SERVER_TYPE and SERVER_LOCATION for info panel
          echo "  Setting SERVER_TYPE secret..."
          echo "cax31" | npx wrangler@4 pages secret put SERVER_TYPE \
            --project-name="$PROJECT_NAME" || echo "⚠️  Failed to set SERVER_TYPE"
          
          echo "  Setting SERVER_LOCATION secret..."
          echo "fsn1" | npx wrangler@4 pages secret put SERVER_LOCATION \
            --project-name="$PROJECT_NAME" || echo "⚠️  Failed to set SERVER_LOCATION"
          
          echo "✅ All secrets set (applies to both production and preview environments)"
          
          echo ""
          echo "✅ Setup complete"
          echo ""
          echo "⚠️  IMPORTANT: Environment variables are now set."
          echo "   If Control Plane still shows errors, the deployment may need to be recreated."
          echo "   Triggering a new deployment to ensure variables are available..."

      - name: Initialize D1 Database Schema
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          DOMAIN: ${{ secrets.DOMAIN }}
        run: |
          echo "🗄️  Initializing D1 database schema..."
          
          # Get D1 database name from Terraform output
          cd tofu/control-plane
          source ../.r2-credentials
          export AWS_ACCESS_KEY_ID="$R2_ACCESS_KEY_ID"
          export AWS_SECRET_ACCESS_KEY="$R2_SECRET_ACCESS_KEY"
          D1_DATABASE_NAME=$(tofu output -raw d1_database_name)
          echo "  D1 Database: $D1_DATABASE_NAME"
          cd ../..
          
          # Initialize schema (creates tables if they don't exist)
          npx wrangler@4 d1 execute "$D1_DATABASE_NAME" --file=control-plane/schema.sql --remote

          # Schema migrations for existing databases
          # admin_only column added for services that can only be toggled via GitHub Actions
          npx wrangler@4 d1 execute "$D1_DATABASE_NAME" --remote --command "ALTER TABLE services ADD COLUMN admin_only INTEGER DEFAULT 0" 2>/dev/null || true
          
          # Store domain in D1 config (escape single quotes)
          ESCAPED_DOMAIN=${DOMAIN//\'/\'\'}
          npx wrangler@4 d1 execute "$D1_DATABASE_NAME" --remote --command "INSERT OR REPLACE INTO config (key, value, updated_at) VALUES ('domain', '$ESCAPED_DOMAIN', datetime('now'))"
          
          # Add initial log entry (sanitize run_id as numeric)
          RUN_ID=$(printf '%d' "${{ github.run_id }}" 2>/dev/null || echo "0")
          npx wrangler@4 d1 execute "$D1_DATABASE_NAME" --remote --command "INSERT INTO logs (source, level, message, metadata) VALUES ('github-action', 'info', 'Control Plane initialized', '{\"workflow\": \"setup-control-plane\", \"run_id\": $RUN_ID}')"
          
          echo "✅ D1 database schema initialized!"

      - name: Initialize services from services.yaml to D1
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          DOMAIN: ${{ secrets.DOMAIN }}
        run: |
          echo "📋 Initializing services from services.yaml to D1..."
          chmod +x .github/scripts/sync-deployed-state.sh
          .github/scripts/sync-deployed-state.sh

      - name: Deploy Control Plane to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          echo "📦 Deploying Control Plane to Cloudflare Pages..."
          
          # Get D1 database ID from Terraform output
          cd tofu/control-plane
          source ../.r2-credentials
          export AWS_ACCESS_KEY_ID="$R2_ACCESS_KEY_ID"
          export AWS_SECRET_ACCESS_KEY="$R2_SECRET_ACCESS_KEY"
          D1_DATABASE_ID=$(tofu output -raw d1_database_id)
          KV_NAMESPACE_ID=$(tofu output -raw kv_namespace_id 2>/dev/null || echo "")
          echo "  D1 Database ID: $D1_DATABASE_ID"
          [ -n "$KV_NAMESPACE_ID" ] && echo "  KV Namespace ID: $KV_NAMESPACE_ID"
          cd ../..

          cd control-plane/pages
          # Verify functions directory exists
          if [ ! -d "functions" ]; then
            echo "❌ Error: functions/ directory not found - API endpoints are required!"
            exit 1
          fi

          # Generate wrangler.toml with D1 + KV bindings
          # pages_build_output_dir is required for Pages to use the config
          PROJECT_NAME="${{ steps.prefix.outputs.project_name }}"
          cat > wrangler.toml << EOF
          name = "$PROJECT_NAME"
          compatibility_date = "2024-01-01"
          pages_build_output_dir = "."

          [[d1_databases]]
          binding = "NEXUS_DB"
          database_id = "$D1_DATABASE_ID"
          EOF

          # Add KV binding if namespace exists
          if [ -n "$KV_NAMESPACE_ID" ]; then
            cat >> wrangler.toml << EOF

          [[kv_namespaces]]
          binding = "NEXUS_KV"
          id = "$KV_NAMESPACE_ID"
          EOF
          fi

          sed -i 's/^          //' wrangler.toml

          echo "  Generated wrangler.toml with bindings"
          cat wrangler.toml
          
          # Deploy to production with D1 + optional KV bindings (with retry for Cloudflare API timeouts)
          # --commit-dirty=true suppresses warning about uncommitted wrangler.toml
          # --commit-message prevents UTF-8 issues with git commit messages
          DEPLOY_OK=false
          for ATTEMPT in 1 2 3; do
            DEPLOY_OUTPUT=$(npx wrangler@4 pages deploy . \
              --project-name="$PROJECT_NAME" \
              --branch=main \
              --commit-dirty=true \
              --commit-message="Deploy Control Plane" 2>&1) && {
              DEPLOY_OK=true
              break
            }
            echo "$DEPLOY_OUTPUT"
            if echo "$DEPLOY_OUTPUT" | grep -q "504\|Gateway Timeout\|upstream request timeout"; then
              if [ "$ATTEMPT" -lt 3 ]; then
                echo "⚠️  Cloudflare timeout on attempt $ATTEMPT - retrying in 15s..."
                sleep 15
              fi
            else
              echo "❌ Deploy failed (non-timeout error) - not retrying"
              break
            fi
          done

          rm wrangler.toml

          if [ "$DEPLOY_OK" = "true" ]; then
            if [ -n "$KV_NAMESPACE_ID" ]; then
              echo "✅ Control Plane deployed with D1 + KV bindings!"
            else
              echo "✅ Control Plane deployed with D1 bindings!"
            fi
          else
            echo "❌ Control Plane deploy failed after 3 attempts"
            exit 1
          fi

      - name: Show setup info
        run: |
          echo ""
          echo "✅ Control Plane setup complete!"
          echo ""
          echo "📋 Control Plane: https://control.${{ secrets.DOMAIN }}"
          echo ""
          echo "ℹ️  Next steps:"
          echo "   1. Use the Control Plane to manage your infrastructure"
          echo "   2. Run 'Spin Up' workflow to deploy the Hetzner server and services"
          echo "   3. Or trigger it manually: Actions → Spin Up Nexus-Stack → Run workflow"

